<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Simple Chat</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; height: 100%; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .msg { background: #334155; padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        .input-area { padding: 10px; background: #1e293b; display: flex; gap: 5px; }
        .emojis { padding: 5px; background: #1e293b; display: flex; gap: 5px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="container">
    <div id="auth"><input type="text" id="user" placeholder="Ник"><button onclick="join()">Войти</button></div>
    <div id="chat" style="display:none; flex-direction:column; height:100%;">
        <div id="messages"></div>
        <div class="emojis" id="emoji-bar"></div>
        <div class="input-area">
            <input type="text" id="txt" placeholder="Сообщение...">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>
<script>
    let ws;
    const emojis = ["😊", "😂", "🔥", "👍", "❤️", "🤔", "🎉", "😎"];
    const bar = document.getElementById("emoji-bar");
    emojis.forEach(e => {
        let s = document.createElement("span");
        s.innerText = e;
        s.onclick = () => document.getElementById("txt").value += e;
        bar.appendChild(s);
    });

    function join() {
        const u = document.getElementById("user").value;
        if(!u) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${u}`);
        ws.onopen = () => { document.getElementById("auth").style.display = "none"; document.getElementById("chat").style.display = "flex"; };
        ws.onmessage = (e) => {
            const div = document.createElement("div");
            div.className = "msg";
            div.innerText = e.data;
            document.getElementById("messages").appendChild(div);
        };
    }
    function send() {
        const t = document.getElementById("txt");
        if(t.value) { ws.send(t.value); t.value = ""; }
    }
</script>
</body>
</html>
