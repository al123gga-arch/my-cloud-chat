<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseChat</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; background: #1e293b; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; background: #334155; position: relative; }
        .my { align-self: flex-end; background: #38bdf8; color: #0f172a; }
        .time { font-size: 10px; opacity: 0.7; text-align: right; margin-top: 5px; }
        .sys { align-self: center; font-size: 11px; color: #94a3b8; background: #0f172a; padding: 5px 10px; border-radius: 10px; }
        
        .controls { padding: 15px; background: #0f172a; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: none; }
        button { padding: 10px; border-radius: 10px; border: none; background: #38bdf8; cursor: pointer; }
    </style>
</head>
<body>
<div class="app" id="login">
    <h1 style="text-align:center; margin-top:50px;">PulseChat</h1>
    <input type="text" id="user" placeholder="Никнейм" style="margin: 20px;">
    <button onclick="join()" style="margin: 0 20px;">Войти</button>
</div>

<div class="app" id="chat" style="display:none;">
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="msg" placeholder="Сообщение...">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
    let ws;
    function join() {
        const u = document.getElementById("user").value;
        if(!u) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${u}`);
        ws.onopen = () => { document.getElementById("login").style.display = "none"; document.getElementById("chat").style.display = "flex"; };
        ws.onmessage = (e) => {
            const p = e.data.split(':');
            const div = document.createElement("div");
            if(p[0].includes("СИСТЕМА")) {
                div.className = "sys"; div.innerText = p[2];
            } else {
                div.className = "msg " + (p[0] === document.getElementById("user").value ? "my" : "");
                div.innerHTML = `<div><b>${p[0]}</b></div><div>${p.slice(2).join(':')}</div><div class="time">${p[1]}</div>`;
            }
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; }
    }
</script>
</body>
</html>
