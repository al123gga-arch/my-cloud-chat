<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Messenger</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            height: 85vh;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        }

        /* Окно авторизации */
        #auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 30px;
            text-align: center;
        }

        #auth-screen h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #38bdf8;
            font-weight: 600;
        }

        #auth-screen p {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Экран чата */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: rgba(15, 23, 42, 0.6);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .chat-header .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Скроллбар */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* Стили сообщений */
        .msg {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Мои сообщения (справа) */
        .msg.my-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Чужие сообщения (слева) */
        .msg.other-msg {
            align-self: flex-start;
            background: #334155;
            color: #f8fafc;
            border-bottom-left-radius: 4px;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #cbd5e1;
            display: block;
        }
        
        .my-msg .msg-sender {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Системные уведомления */
        .system-msg {
            align-self: center;
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 99px;
            margin: 5px 0;
        }

        /* Форма ввода */
        .input-area {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="text"] {
            flex-grow: 1;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #38bdf8;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2>Войти в сеть</h2>
        <p>Придумай никнейм, чтобы войти в приватную комнату</p>
        <div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
            <input type="text" id="username" placeholder="Твоё имя или ник..." autocomplete="off">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div class="status" id="chat-title">Комната чата</div>
            <span style="font-size: 13px; color: #64748b;">v2.0 Beta</span>
        </div>
        
        <div id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="messageText" placeholder="Написать сообщение..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script>
    let ws;
    let myName = "";

    // Автоматически берем текущий хост (работает и на localhost, и на Render!)
    const currentHost = window.location.host;
    // Если зашли по https, ставим wss, иначе обычный ws
    const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';

    function joinChat() {
        const nameInput = document.getElementById("username");
        myName = nameInput.value.trim();
        
        if (!myName) {
            alert("Пожалуйста, введи никнейм!");
            return;
        }

        // Подключаемся к нашему бэкенду
        ws = new WebSocket(`${wsProtocol}${currentHost}/ws/${encodeURIComponent(myName)}`);

        ws.onopen = function() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("chat-screen").style.display = "flex";
            document.getElementById("chat-title").innerText = `Чат: ${myName}`;
        };

        ws.onmessage = function(event) {
            const messagesContainer = document.getElementById('messages');
            
            // Проверяем, системное ли это сообщение (вход/выход)
            if (event.data.includes("присоединился") || event.data.includes("покинул")) {
                const systemDiv = document.createElement('div');
                systemDiv.className = 'system-msg';
                systemDiv.innerText = event.data;
                messagesContainer.appendChild(systemDiv);
            } else {
                // Парсим обычное сообщение формата "Ник: Текст"
                const splitIndex = event.data.indexOf(':');
                if (splitIndex !== -1) {
                    const sender = event.data.substring(0, splitIndex).trim();
                    const text = event.data.substring(splitIndex + 1).trim();
                    
                    const msgDiv = document.createElement('div');
                    // Если ник совпадает с нашим — это наше сообщение (справа), иначе — чужое (слева)
                    if (sender === myName) {
                        msgDiv.className = 'msg my-msg';
                    } else {
                        msgDiv.className = 'msg other-msg';
                    }

                    msgDiv.innerHTML = `<span class="msg-sender">${sender}</span>${text}`;
                    messagesContainer.appendChild(msgDiv);
                }
            }
            
            // Автоматический скролл вниз при новых сообщениях
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        ws.onclose = function() {
            alert("Соединение с сервером разорвано. Перезагрузите страницу.");
        };
    }

    function sendMessage() {
        const input = document.getElementById("messageText");
        const text = input.value.trim();
        if (text && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(text);
            input.value = '';
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>
</body>
</html>
