<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 18px; background: #334155; max-width: 80%; }
        .my { align-self: flex-end; background: #38bdf8; color: #0f172a; }
        .sys { align-self: center; color: #94a3b8; font-size: 12px; }
        .controls { padding: 15px; background: #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #0f172a; color: white; }
        button { padding: 10px 20px; border-radius: 12px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="app" id="login">
    <h1 style="text-align:center; margin-top:100px;">PulseChat</h1>
    <input type="text" id="user" placeholder="Никнейм">
    <button onclick="join()">Войти</button>
</div>
<div class="app" id="chat" style="display:none;">
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="msg" placeholder="Сообщение...">
        <button onclick="send()">➤</button>
    </div>
</div>
<script>
    let ws, myName;
    function join() {
        myName = document.getElementById("user").value;
        if(!myName) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${myName}`);
        ws.onopen = () => { document.getElementById("login").style.display="none"; document.getElementById("chat").style.display="flex"; };
        ws.onmessage = (e) => {
            const p = e.data.split(':');
            const div = document.createElement("div");
            if(p[0] === "СИСТЕМА") { div.className = "sys"; div.innerText = p[1]; }
            else { div.className = "msg " + (p[0] === myName ? "my" : ""); div.innerText = `${p[0]}: ${p.slice(1).join(':')}`; }
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; }
    }
</script>
</body>
</html>
