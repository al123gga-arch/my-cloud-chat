<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PulseChat</title>
    <style>
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .pulse-title { background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc); background-size: 200% 200%; animation: gradient 3s ease infinite; -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; font-size: 28px; margin-bottom: 20px; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; width: 100%; max-width: 450px; height: 90vh; border-radius: 28px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        @media (max-width: 600px) { .container { height: 100vh; border-radius: 0; } }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { padding: 8px 12px; border-radius: 15px; background: #334155; max-width: 80%; width: fit-content; }
        .my { align-self: flex-end; background: #38bdf8; color: #0f172a; }
        .sender-name { font-size: 11px; color: #38bdf8; font-weight: bold; margin-bottom: 2px; }
        .msg-text { font-size: 15px; }
        .time { font-size: 10px; opacity: 0.7; text-align: right; margin-top: 4px; }
        .system { align-self: center; background: rgba(255,255,255,0.05); font-size: 11px; color: #94a3b8; padding: 4px 12px; border-radius: 10px; }

        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 8px; align-items: center; border-top: 1px solid #475569; }
        input { flex-grow: 1; padding: 14px; border-radius: 16px; border: none; background: #0f172a; color: white; outline: none; }
        button { padding: 12px 20px; border-radius: 16px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; }
        #emoji-popup { display: none; position: absolute; bottom: 80px; left: 10px; right: 10px; background: #334155; padding: 15px; border-radius: 20px; grid-template-columns: repeat(6, 1fr); gap: 8px; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .emoji-btn { cursor: pointer; font-size: 22px; text-align: center; background: #475569; border-radius: 8px; padding: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div id="auth-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
        <div class="auth-card" style="background:#334155; padding:30px; border-radius:24px; text-align:center; width:80%;">
            <h1 class="pulse-title">PulseChat</h1>
            <input type="text" id="username" placeholder="Твой ник..." style="width:100%; padding:14px; margin-bottom:15px; border-radius:12px; border:none;">
            <button onclick="join()" style="width:100%">Войти</button>
        </div>
    </div>
    <div id="chat-screen" style="display:none; flex-direction:column; height:100%; position:relative;">
        <div id="messages"></div>
        <div id="emoji-popup"></div>
        <div class="input-area">
            <button onclick="toggleEmoji()">😊</button>
            <input type="text" id="msg" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>
<script>
    let ws;
    const emojis = ["😊", "😂", "🔥", "👍", "❤️", "🤔", "🎉", "😎", "🚀", "💀", "✌️", "😍"];
    const popup = document.getElementById("emoji-popup");
    emojis.forEach(e => {
        let s = document.createElement("div"); s.className = "emoji-btn"; s.innerText = e;
        s.onclick = () => document.getElementById("msg").value += e; popup.appendChild(s);
    });
    function toggleEmoji() { popup.style.display = (popup.style.display === 'grid') ? 'none' : 'grid'; }

    function join() {
        const u = document.getElementById("username").value;
        if(!u) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${u}`);
        ws.onopen = () => { document.getElementById("auth-screen").style.display = "none"; document.getElementById("chat-screen").style.display = "flex"; };
        ws.onmessage = (e) => {
            const parts = e.data.split(':');
            const sender = parts[0];
            const time = parts[1];
            const text = parts.slice(2).join(':');
            const div = document.createElement("div");
            
            if(sender === "📢 СИСТЕМА" || sender === "❌ СИСТЕМА") {
                div.className = "system"; div.innerText = text;
            } else {
                div.className = "msg-box " + (sender === document.getElementById("username").value ? 'my' : '');
                div.innerHTML = `<div class="sender-name">${sender}</div><div class="msg-text">${text}</div><div class="time">${time}</div>`;
            }
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; popup.style.display = 'none'; }
    }
</script>
</body>
</html>
