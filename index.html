<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BurmaldaMessenger</title>
    <style>
        * { box-sizing: border-box; }
        @keyframes grad { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .win {
            background: #000;
            display: flex;
            flex-direction: column;
            border: 3px solid transparent;
            border-image: linear-gradient(45deg, #ff0055, #8800ff, #00d2ff) 1;
            animation: grad 5s linear infinite;
            position: relative;
        }
        @media (max-width: 600px) {
            .win { width: 100vw; height: 100vh; border-radius: 0; border: none; animation: none; background: #050505; }
            body { background: #050505; }
        }
        @media (min-width: 601px) {
            .win { width: 500px; height: 700px; border-radius: 24px; background: #000; }
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0 10px 0;
            text-align: center;
            background: linear-gradient(45deg, #ff0055, #8800ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-field {
            background: #111;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .input-field:focus { border-color: #00d2ff; }
        .btn {
            background: linear-gradient(90deg, #00d2ff, #8800ff);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #00d2ff;
            color: #00d2ff;
        }
        #chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #msgs {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 15px;
        }
        .my-message {
            align-self: flex-end;
            background: #2a2a2a;
            border-bottom-right-radius: 4px;
        }
        .other-message {
            align-self: flex-start;
            background: #1e1e1e;
            border-bottom-left-radius: 4px;
        }
        .system {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin: 4px 0;
        }
        .sender-name {
            font-size: 12px;
            font-weight: bold;
            color: #00d2ff;
            margin-bottom: 2px;
        }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #0a0a0a;
            border-top: 1px solid #1f1f1f;
            align-items: center;
        }
        .emoji-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 30px;
            transition: 0.1s;
        }
        .message-input {
            flex: 1;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 10px 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: #00d2ff;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
            color: black;
            cursor: pointer;
        }
        .error {
            color: #ff4466;
            font-size: 14px;
            text-align: center;
            margin-top: 8px;
        }
        .switch-form {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .switch-form span {
            color: #00d2ff;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="win" id="app">
    <div id="authForm">
        <div class="title">BurmaldaMessenger</div>
        <div class="auth-container">
            <input type="text" id="loginUsername" class="input-field" placeholder="Никнейм" autocomplete="username">
            <input type="password" id="loginPassword" class="input-field" placeholder="Пароль" autocomplete="current-password">
            <button id="loginBtn" class="btn">Войти</button>
            <div class="switch-form">Нет аккаунта? <span id="showRegister">Зарегистрироваться</span></div>
            <div id="authError" class="error"></div>
        </div>
    </div>
    <div id="registerForm" style="display: none;">
        <div class="title">Регистрация</div>
        <div class="auth-container">
            <input type="text" id="regUsername" class="input-field" placeholder="Придумайте ник" autocomplete="off">
            <input type="password" id="regPassword" class="input-field" placeholder="Пароль" autocomplete="new-password">
            <button id="registerBtn" class="btn">Создать аккаунт</button>
            <div class="switch-form">Уже есть аккаунт? <span id="showLogin">Войти</span></div>
            <div id="regError" class="error"></div>
        </div>
    </div>
    <div id="chat">
        <div id="msgs"></div>
        <div class="input-area">
            <button id="emojiBtn" class="emoji-btn">😊</button>
            <input type="text" id="messageInput" class="message-input" placeholder="Сообщение..." autocomplete="off">
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>
</div>
<script>
    // ---------- Глобальные переменные ----------
    let ws = null;
    let currentUser = null;

    // DOM элементы
    const authFormDiv = document.getElementById('authForm');
    const registerFormDiv = document.getElementById('registerForm');
    const chatDiv = document.getElementById('chat');
    const loginBtn = document.getElementById('loginBtn');
    const showRegister = document.getElementById('showRegister');
    const showLogin = document.getElementById('showLogin');
    const registerBtn = document.getElementById('registerBtn');
    const authError = document.getElementById('authError');
    const regError = document.getElementById('regError');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const msgsDiv = document.getElementById('msgs');

    // Переключение между формами
    showRegister.onclick = () => { authFormDiv.style.display = 'none'; registerFormDiv.style.display = 'flex'; authError.innerText = ''; regError.innerText = ''; };
    showLogin.onclick = () => { registerFormDiv.style.display = 'none'; authFormDiv.style.display = 'flex'; authError.innerText = ''; regError.innerText = ''; };

    // Функция показа ошибки
    function showAuthError(msg) { authError.innerText = msg; }
    function showRegError(msg) { regError.innerText = msg; }

    // Логин
    loginBtn.onclick = async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) { showAuthError('Заполните оба поля'); return; }
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        });
        const data = await res.json();
        if (data.ok) {
            currentUser = data.username;
            localStorage.setItem('burmalda_user', currentUser);
            localStorage.setItem('burmalda_token', btoa(`${username}:${password}`)); // простое сохранение сессии
            connectWebSocket();
        } else {
            showAuthError(data.error || 'Ошибка входа');
        }
    };

    // Регистрация
    registerBtn.onclick = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !password) { showRegError('Заполните оба поля'); return; }
        if (username.length < 2) { showRegError('Ник должен быть не менее 2 символов'); return; }
        const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        });
        const data = await res.json();
        if (data.ok) {
            // После регистрации сразу переключаем на логин
            showRegError('');
            registerFormDiv.style.display = 'none';
            authFormDiv.style.display = 'flex';
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = password;
            showAuthError('Регистрация успешна! Теперь войдите.');
        } else {
            showRegError(data.error || 'Ошибка регистрации');
        }
    };

    // Проверяем сохранённую сессию
    async function tryAutoLogin() {
        const savedUser = localStorage.getItem('burmalda_user');
        if (savedUser) {
            // Для авто-входа нужно проверить пароль. Проще попросить ввести заново, или хранить токен.
            // Сделаем безопаснее: не храним пароль, а только запоминаем ник, но пароль нужно ввести снова.
            // Либо храним сессионный токен на сервере. Упрощённо: очистим сохранение, чтобы не было ложного входа.
            localStorage.removeItem('burmalda_user'); // чтобы не мешал
        }
    }
    tryAutoLogin();

    // WebSocket подключение
    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        ws = new WebSocket(`${protocol}${window.location.host}/ws/${encodeURIComponent(currentUser)}`);
        
        ws.onopen = () => {
            authFormDiv.style.display = 'none';
            registerFormDiv.style.display = 'none';
            chatDiv.style.display = 'flex';
            msgsDiv.innerHTML = '';
        };
        
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            const div = document.createElement('div');
            if (msg.type === 'system') {
                div.className = 'system';
                div.innerText = msg.text;
            } else {
                const isMe = (msg.sender === currentUser);
                div.className = `message ${isMe ? 'my-message' : 'other-message'}`;
                if (!isMe) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'sender-name';
                    nameSpan.innerText = msg.sender;
                    div.appendChild(nameSpan);
                }
                const textSpan = document.createElement('span');
                textSpan.innerText = msg.text;
                div.appendChild(textSpan);
            }
            msgsDiv.appendChild(div);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        };
        
        ws.onclose = () => {
            if (chatDiv.style.display === 'flex') {
                alert('Соединение разорвано. Обновите страницу.');
                chatDiv.style.display = 'none';
                authFormDiv.style.display = 'flex';
            }
        };
    }

    // Отправка сообщения
    function sendMessage() {
        let text = messageInput.value.trim();
        if (text && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(text);
            messageInput.value = '';
        }
    }

    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Эмодзи-пикер (простой)
    const emojiBtn = document.getElementById('emojiBtn');
    emojiBtn.onclick = () => {
        // Нативное открытие панели эмодзи не везде работает, добавим выпадашку
        // Для простоты используем стандартный диалог выбора эмодзи (только Chrome/Edge поддерживают)
        if ('showEmojiPicker' in navigator) {
            navigator.showEmojiPicker();
        } else {
            // fallback: открыть небольшое меню
            const picker = document.createElement('div');
            picker.style.position = 'absolute';
            picker.style.bottom = '70px';
            picker.style.left = '20px';
            picker.style.background = '#1f1f1f';
            picker.style.borderRadius = '12px';
            picker.style.padding = '8px';
            picker.style.display = 'grid';
            picker.style.gridTemplateColumns = 'repeat(6, 1fr)';
            picker.style.gap = '6px';
            const emojis = ['😀','😂','😍','🥲','😎','😢','🔥','❤️','👍','🎉','🤔','👀','✅','⭐','🍕','💀'];
            emojis.forEach(emo => {
                const btn = document.createElement('button');
                btn.textContent = emo;
                btn.style.fontSize = '24px';
                btn.style.background = 'none';
                btn.style.border = 'none';
                btn.style.cursor = 'pointer';
                btn.onclick = () => {
                    messageInput.value += emo;
                    picker.remove();
                };
                picker.appendChild(btn);
            });
            document.body.appendChild(picker);
            setTimeout(() => picker.remove(), 8000);
        }
    };
</script>
</body>
</html>
