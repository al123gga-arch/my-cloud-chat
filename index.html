<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BurmaldaMessenger</title>
    <style>
        :root { --grad: linear-gradient(90deg, #ff0055, #8800ff, #00d2ff); }
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .wrapper { width: 400px; height: 600px; background: #111; border-radius: 20px; padding: 2px; position: relative; border: 2px solid transparent; background-clip: padding-box; }
        .wrapper::before { content: ''; position: absolute; inset: -2px; border-radius: 20px; background: var(--grad); z-index: -1; }
        .content { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: #111; border-radius: 18px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; background: #222; max-width: 75%; }
        .my { align-self: flex-end; background: #00d2ff; color: #000; }
        .controls { padding: 10px; background: #1a1a1a; display: flex; gap: 5px; align-items: center; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; }
        #emoji-grid { display: none; grid-template-columns: repeat(6, 1fr); padding: 5px; background: #111; }
    </style>
</head>
<body>
<div class="wrapper" id="auth"><div class="content" style="justify-content:center; align-items:center; gap:10px;">
    <h2>BurmaldaMessenger</h2>
    <input type="text" id="user" placeholder="Никнейм..." style="width:50%; padding:8px;">
    <button onclick="join()">Войти</button>
</div></div>

<div class="wrapper" id="chat" style="display:none;"><div class="content">
    <div id="messages"></div>
    <div id="emoji-grid"></div>
    <div class="controls">
        <button onclick="document.getElementById('emoji-grid').style.display = document.getElementById('emoji-grid').style.display === 'grid' ? 'none' : 'grid'">😊</button>
        <input type="text" id="msg" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">➤</button>
    </div>
</div></div>

<script>
    let ws, myName;
    const emojis = ["😀","😂","🥰","😎","🔥","👍","❤️","💀","🚀","🎉","😱","🤔","✅","✨","👑"];
    emojis.forEach(e => {
        let s = document.createElement("span"); s.innerText = e; s.style.cursor="pointer"; s.style.fontSize="20px";
        s.onclick = () => document.getElementById("msg").value += e;
        document.getElementById("emoji-grid").appendChild(s);
    });

    function join() {
        myName = document.getElementById("user").value;
        if(!myName) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${myName}`);
        ws.onopen = () => { document.getElementById("auth").style.display="none"; document.getElementById("chat").style.display="block"; };
        ws.onmessage = (e) => {
            const p = e.data.split(':');
            const d = document.createElement("div");
            d.className = "msg " + (p[0] === myName ? "my" : "");
            d.innerText = p[0] + ": " + p.slice(1).join(':');
            document.getElementById("messages").appendChild(d);
            document.getElementById("messages").scrollTop = 9999;
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; }
    }
</script>
</body>
</html>
