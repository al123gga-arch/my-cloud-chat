<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>BurmaldaMess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
/* ===== БАЗОВЫЕ СТИЛИ (ТВОЙ ДИЗАЙН) ===== */
* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
:root {
  --bg: #080810; --surface: #0e0e1a; --surface2: #13131f; --surface3: #1a1a2e;
  --border: #2a2a3a; --text: #e8e8f0; --dim: #6b6b88;
  --accent: #7c5cfc; --accent2: #fc5c7d; --green: #4ade80;
  --grad: linear-gradient(135deg,#7c5cfc,#fc5c7d);
  --glow: rgba(124,92,252,0.25);
  --sidebar-w: 260px;
}
[data-theme="light"] {
  --bg: #f0eff8; --surface: #fff; --surface2: #f5f4fc; --surface3: #eeedf8;
  --border: #dddaf5; --text: #1a1a2e; --dim: #8888aa; --glow: rgba(124,92,252,0.12);
}
body { margin:0; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif;
  display:flex; justify-content:center; align-items:center; min-height:100vh; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px; opacity:.25; }
#app { position:relative; z-index:1; display:flex; flex-direction:column;
  background:var(--surface); overflow:auto; width:100%; max-width:920px; margin:0 auto; }
@media(max-width:600px){ #app{width:100%; min-height:100vh; border-radius:0; } }
@media(min-width:601px){ #app{width:920px; height:700px; border-radius:24px;
  box-shadow:0 0 0 1px var(--border),0 24px 64px rgba(0,0,0,.5),0 0 80px var(--glow); overflow:hidden; } }

/* ... (все остальные базовые стили из предыдущего кода, оставлены без изменений) ... */
/* Для краткости я не копирую всю простыню, но ты должен оставить ВСЁ, что было раньше. */
/* Я покажу только новые/изменённые стили ниже. */

/* ===== НОВЫЕ СТИЛИ ===== */

/* Анимация модальных окон */
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); display:flex; align-items:center; justify-content:center;
  z-index: 300; animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--surface); border-radius: 20px; padding: 24px; width: 90%; max-width: 340px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5); animation: modalIn 0.25s ease;
  position: relative;
}
.modal-close {
  position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--dim);
  font-size: 20px; cursor: pointer;
}
.modal-profile { text-align: center; margin-bottom: 20px; }
.modal-username { font-size: 20px; font-weight: 800; margin: 8px 0 4px; }
.modal-meta { font-size: 13px; color: var(--dim); }
.modal-actions { display: flex; flex-direction: column; gap: 8px; }
.modal-btn {
  padding: 12px; border-radius: 14px; border: none; font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.15s;
}
.modal-btn.primary { background: var(--grad); color: #fff; }
.modal-btn.secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
.modal-btn.danger { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }

/* Панель эмодзи – фиксированная */
.emoji-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface2);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 10px;
  z-index: 250;
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
  max-height: 50vh;
  overflow-y: auto;
}
.emoji-panel.open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.emoji-item {
  background: transparent; border: none; font-size: 32px; cursor: pointer;
  padding: 4px; border-radius: 12px; transition: background 0.15s;
}
.emoji-item:hover { background: var(--surface3); }

/* Стили для цитирования (reply) */
.reply-preview {
  background: var(--surface3); border-left: 3px solid var(--accent); padding: 8px 12px;
  margin: 4px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px;
}
.reply-preview .reply-sender { font-weight: 700; font-size: 12px; color: var(--accent); }
.reply-preview .reply-text { font-size: 13px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reply-preview .reply-cancel { margin-left: auto; background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px; }

/* Кнопка "Редактировать" в сообщении */
.edit-indicator {
  background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 8px;
  font-size: 11px; margin-top: 4px; display: inline-block;
}

/* Индикатор прочтения (галочки) */
.read-status {
  font-size: 11px; color: var(--dim); margin-top: 4px; text-align: right;
  font-family: 'Space Mono', monospace;
}

/* Список участников комнаты */
.members-list {
  max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
}
.member-item {
  display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 12px;
  background: var(--surface2);
}
.member-item .member-name { font-size: 14px; font-weight: 700; }
.member-item .member-status { font-size: 12px; color: var(--dim); }
.member-item .member-role { font-size: 11px; background: var(--accent); color: #fff; padding: 2px 6px; border-radius: 6px; margin-left: auto; }

/* Мобильная адаптация */
@media (max-width: 600px) {
  .emoji-panel { border-radius: 16px 16px 0 0; }
}
</style>
</head>
<body>
<div id="app">
<!-- ... (полностью вся структура HTML как раньше) ... -->
</div>

<script>
// ===== ВСЯ ПРЕДЫДУЩАЯ ЛОГИКА (соединение, WS, сообщения, voice...) =====
// ... (оставляем без изменений) ...

// ============ НОВЫЕ ФУНКЦИИ И ИЗМЕНЕНИЯ ============

// 1. Панель эмодзи – переписана
const EMOJI_LIST = ['😀','😂','😍','😎','😢','🔥','❤️','👍','🎉','🤔','👀','✅','⭐','🍕','💀','🤯','💯','🙈','😤','🥳','😘','🥲','😡','👿'];
const emojiPanel = document.getElementById('emojiPanel');
const emojiBtn = document.getElementById('emojiBtn');

function buildEmojiPanel() {
  emojiPanel.innerHTML = '';
  EMOJI_LIST.forEach(emo => {
    const btn = document.createElement('button');
    btn.className = 'emoji-item';
    btn.textContent = emo;
    btn.addEventListener('click', () => {
      if (editingMsgId) { // если редактируем – добавляем в поле редактирования
        msgInput.value += emo;
      } else {
        msgInput.value += emo;
      }
      msgInput.focus();
    });
    emojiPanel.appendChild(btn);
  });
}
buildEmojiPanel();

emojiBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  // Закрываем панель, если открыта
  if (emojiPanel.classList.contains('open')) {
    emojiPanel.classList.remove('open');
  } else {
    emojiPanel.classList.add('open');
    // Прокручиваем панель в видимую область (на мобильных)
    if (window.innerWidth <= 600) {
      setTimeout(() => {
        emojiPanel.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }, 100);
    }
  }
});

// Закрытие панели при клике вне её
document.addEventListener('click', (e) => {
  if (!emojiPanel.contains(e.target) && e.target !== emojiBtn) {
    emojiPanel.classList.remove('open');
  }
});

// Учет виртуальной клавиатуры на мобильных
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (emojiPanel.classList.contains('open')) {
      emojiPanel.style.bottom = (window.innerHeight - window.visualViewport.height) + 'px';
    }
  });
}

// 2. Профиль (уже был, но добавим стили)
function showProfile(username){
  // ... оставляем код showProfile, но добавляем закрытие по клику на overlay,
  // и убедимся, что overlay и modal имеют правильные классы (уже есть в новых стилях)
}

// 3. Список участников комнаты (как в Telegram)
function showRoomMembers() {
  const roomId = currentRoom;
  const members = [];
  for (let [user, info] of Object.entries(activeConnectionsCache || {})) {
    if (info.room === roomId) members.push(user);
  }
  // Если нет кеша, запрашиваем у сервера
  wsSend({type: 'get_room_members', room_id: roomId});
}

// Обработчик ответа от сервера (нужно добавить в server.py)
// Пока сделаем заглушку на основе online_users в этой комнате
function displayRoomMembers(members) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <button class="modal-close">✕</button>
    <h3 style="margin-bottom:16px;">👥 Участники (${members.length})</h3>
    <div class="members-list" id="membersListContent"></div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const list = modal.querySelector('#membersListContent');
  members.forEach(username => {
    const item = document.createElement('div');
    item.className = 'member-item';
    const av = avatarEl(username, 'sm');
    item.appendChild(av);
    const nameSpan = document.createElement('span');
    nameSpan.className = 'member-name';
    nameSpan.textContent = username;
    item.appendChild(nameSpan);
    const statusSpan = document.createElement('span');
    statusSpan.className = 'member-status';
    statusSpan.textContent = onlineUsers.includes(username) ? '🟢 онлайн' : '⚫ офлайн';
    item.appendChild(statusSpan);
    if (username === currentUser) {
      const roleBadge = document.createElement('span');
      roleBadge.className = 'member-role';
      roleBadge.textContent = currentRole === 'owner' ? 'Владелец' : 'Участник';
      item.appendChild(roleBadge);
    }
    list.appendChild(item);
  });

  modal.querySelector('.modal-close').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

// Добавляем кнопку в шапку
document.getElementById('showMembersBtn').onclick = showRoomMembers; // нужно создать кнопку
// В HTML добавим <button id="showMembersBtn" class="icon-btn" title="Участники">👥</button> в chat-header

// 4. Редактирование сообщений
let editingMsgId = null;
function startEditMessage(msgId, currentText) {
  editingMsgId = msgId;
  msgInput.value = currentText;
  msgInput.focus();
  sendBtn.style.display = 'none'; // скрываем обычную кнопку
  // Показываем кнопки "Сохранить" и "Отмена"
  if (!document.getElementById('editSaveBtn')) {
    const editActions = document.createElement('div');
    editActions.id = 'editActions';
    editActions.style.display = 'flex';
    editActions.style.gap = '8px';
    editActions.innerHTML = `
      <button id="editSaveBtn" class="btn" style="padding:8px 16px;">💾</button>
      <button id="editCancelBtn" class="btn btn-out" style="padding:8px 16px;">✕</button>
    `;
    document.querySelector('.input-area').appendChild(editActions);
    document.getElementById('editSaveBtn').onclick = saveEdit;
    document.getElementById('editCancelBtn').onclick = cancelEdit;
  } else {
    document.getElementById('editActions').style.display = 'flex';
  }
}
function saveEdit() {
  const newText = msgInput.value.trim();
  if (newText && editingMsgId) {
    wsSend({type: 'edit_message', msg_id: editingMsgId, text: newText, room_id: currentRoom});
  }
  cancelEdit();
}
function cancelEdit() {
  editingMsgId = null;
  msgInput.value = '';
  sendBtn.style.display = '';
  document.getElementById('editActions').style.display = 'none';
}

// В context menu добавляем кнопку "Редактировать" (только для своих сообщений)
// Модифицируем showDeleteMenu или создаем новое меню
// ...

// 5. Индикатор прочтения (DM)
function markAsRead(roomId) {
  if (roomId.startsWith('dm_')) {
    wsSend({type: 'mark_read', room_id: roomId});
  }
}
// Вызываем при входе в комнату
// В joinRoom/joinDM добавляем markAsRead(currentRoom);
// При получении сообщения в активной комнате тоже помечаем прочитанным.
// Сервер должен слать confirm.

// 6. Ответ с цитированием
let replyToMsg = null;
function replyToMessage(msgId, sender, text) {
  replyToMsg = { msgId, sender, text };
  showReplyPreview();
  msgInput.focus();
}
function showReplyPreview() {
  if (!replyToMsg) return;
  const existing = document.getElementById('replyPreview');
  if (existing) existing.remove();
  const preview = document.createElement('div');
  preview.id = 'replyPreview';
  preview.className = 'reply-preview';
  preview.innerHTML = `
    <div>
      <span class="reply-sender">${replyToMsg.sender}</span>
      <span class="reply-text">${replyToMsg.text}</span>
    </div>
    <button class="reply-cancel" onclick="cancelReply()">✕</button>
  `;
  const inputArea = document.querySelector('.input-area');
  inputArea.parentNode.insertBefore(preview, inputArea);
}
function cancelReply() {
  replyToMsg = null;
  const preview = document.getElementById('replyPreview');
  if (preview) preview.remove();
}
// При отправке сообщения:
function sendMessage() {
  let text = msgInput.value.trim();
  if (!text) return;
  let payload = { type: 'text', text, room_id: currentRoom };
  if (replyToMsg) {
    payload.reply_to = replyToMsg.msgId;
    cancelReply();
  }
  wsSend(payload);
  msgInput.value = '';
  clearTyping();
  if (editingMsgId) cancelEdit();
}

// Дополнительные стили для цитаты в сообщении (в renderMsg)
// ...

// Серверные изменения (рекомендации для server.py)
/*
1. Обработчик 'edit_message': найти сообщение по msg_id и room_id, обновить текст, добавить флаг edited.
   Разослать обновление всем в комнате.
2. Обработчик 'mark_read': для комнаты DM, отправить отправителю подтверждение о прочтении конкретного сообщения (или всех до определённого ID).
3. Обработчик 'get_room_members': вернуть список активных пользователей в комнате (можно из active_connections).
4. Обработчик 'reply_to' при тексте: можно просто передавать reply_to в объекте сообщения, клиент сам отобразит.
*/
</script>
</body>
</html>
