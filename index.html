<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BurmaldaMessenger</title>
    <style>
        body { margin: 0; background-color: #050505; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .win { width: 100vw; max-width: 400px; height: 100vh; border: 2px solid #333333; background-color: #000000; display: flex; flex-direction: column; }
        .auth { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 15px; }
        .in { width: 200px; padding: 10px; border: 1px solid #444444; border-radius: 8px; background-color: #111111; color: #ffffff; outline: none; }
        .btn { padding: 10px 25px; border-radius: 8px; border: none; background-color: #00d2ff; font-weight: bold; cursor: pointer; }
        #chat { display: none; flex-direction: column; height: 100%; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 8px 12px; background-color: #1a1a1a; border-radius: 12px; max-width: 75%; word-break: break-all; }
        .me { align-self: flex-end; background-color: #00d2ff; color: #000000; }
        .foot { padding: 10px; background-color: #000000; display: flex; gap: 8px; }
        .eg { display: none; grid-template-columns: repeat(5, 1fr); padding: 5px; background-color: #111111; }
    </style>
</head>
<body>
<div class="win" id="login"><div class="auth">
    <h3>BurmaldaMessenger</h3>
    <input id="u" class="in" placeholder="Никнейм">
    <button class="btn" onclick="join()">Войти</button>
</div></div>
<div class="win" id="chat">
    <div id="msgs"></div>
    <div id="eg" class="eg"></div>
    <div class="foot">
        <button onclick="document.getElementById('eg').style.display=document.getElementById('eg').style.display==='grid'?'none':'grid'">😊</button>
        <input id="m" class="in" style="flex:1" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button class="btn" onclick="send()">➤</button>
    </div>
</div>
<script>
    let ws, n;
    ["😀","😂","🥰","😎","🔥","👍","❤️","💀","🚀","🎉"].forEach(e => {
        let s = document.createElement("span"); s.innerText=e; s.style.cursor="pointer";
        s.onclick=()=>document.getElementById("m").value+=e; document.getElementById("eg").appendChild(s);
    });
    function join() {
        n = document.getElementById("u").value;
        if(!n) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${n}`);
        ws.onopen = () => { document.getElementById("login").style.display="none"; document.getElementById("chat").style.display="flex"; };
        ws.onmessage = (e) => {
            const p = e.data.split(':'), d = document.createElement("div");
            d.className="m "+(p[0]===n?"me":""); d.innerText=p[0]+": "+p.slice(1).join(':');
            document.getElementById("msgs").appendChild(d); document.getElementById("msgs").scrollTop=99999;
        };
    }
    function send() {
        const i = document.getElementById("m");
        if(i.value) { ws.send(i.value); i.value=""; }
    }
</script>
</body>
</html>
