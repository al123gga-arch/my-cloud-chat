<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>BurmaldaMess</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #080810; --surface: #0e0e1a; --surface2: #13131f; --surface3: #1a1a2e;
  --border: #2a2a3a; --text: #e8e8f0; --dim: #6b6b88;
  --accent: #7c5cfc; --accent2: #fc5c7d; --green: #4ade80;
  --grad: linear-gradient(135deg,#7c5cfc,#fc5c7d);
}
[data-theme="light"] {
  --bg: #f0eff8; --surface: #fff; --surface2: #f5f4fc; --surface3: #eeedf8;
  --border: #dddaf5; --text: #1a1a2e; --dim: #8888aa;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui; display:flex; justify-content:center; align-items:center; min-height:100vh; }
#app { background:var(--surface); width:100%; height:100%; overflow:hidden; display:flex; flex-direction:column; }
@media(min-width:601px){ #app{ width:920px; height:700px; border-radius:24px; } }

/* Auth */
.auth-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:20px; }
.logo-icon { width:64px; height:64px; background:var(--grad); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:30px; margin-bottom:14px; }
.logo-title { font-size:26px; font-weight:800; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.form { width:100%; max-width:320px; margin-top:20px; display:flex; flex-direction:column; gap:12px; }
.inp { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:12px 16px; color:var(--text); font-size:15px; width:100%; outline:none; }
.btn { background:var(--grad); border:none; border-radius:14px; padding:12px; font-weight:700; color:#fff; cursor:pointer; }
.btn-out { background:transparent; border:1px solid var(--border); color:var(--dim); }
.err { color:var(--accent2); font-size:13px; text-align:center; margin-top:5px; }
.divider { display:flex; align-items:center; gap:10px; color:var(--dim); margin:5px 0; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* Main layout */
#main { display:none; flex:1; flex-direction:row; height:100%; }
.sidebar { width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-header { padding:12px; border-bottom:1px solid var(--border); }
.my-profile { display:flex; align-items:center; gap:8px; cursor:pointer; padding:6px; border-radius:12px; }
.avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; background:#7c5cfc; color:#fff; }
.avatar.sm { width:28px; height:28px; font-size:12px; }
.sidebar-search { margin-top:12px; position:relative; }
.sidebar-search input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:8px 12px 8px 32px; color:var(--text); font-size:13px; outline:none; }
.sidebar-search::before { content:'🔍'; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:12px; }
.chat-list { flex:1; overflow-y:auto; padding:6px; }
.chat-item { display:flex; align-items:center; gap:10px; padding:10px; border-radius:12px; cursor:pointer; }
.chat-item.active { background:var(--surface3); }
.chat-item-name { font-weight:700; font-size:14px; }
.chat-item-preview { font-size:11px; color:var(--dim); }
.chat-item-badge { background:var(--accent); border-radius:12px; padding:2px 8px; font-size:11px; }
.sidebar-section { padding:8px 12px 4px; font-size:11px; color:var(--dim); }
.sidebar-footer { padding:10px; border-top:1px solid var(--border); display:flex; gap:8px; }
.icon-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text); padding:8px; border-radius:10px; }
.create-room-btn { background:var(--surface2); border:1px dashed var(--border); border-radius:12px; padding:8px; text-align:center; font-size:13px; cursor:pointer; margin:6px 12px; }

/* Chat panel */
.chat-panel { flex:1; display:flex; flex-direction:column; min-width:0; height:100%; }
.chat-header { display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.chat-room-name { font-weight:800; font-size:16px; }
.chat-status { font-size:11px; color:var(--dim); }
#msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.msg-wrap { max-width:80%; display:flex; flex-direction:column; margin-bottom:4px; }
.msg-wrap.me { align-self:flex-end; }
.msg-wrap.them { align-self:flex-start; }
.msg-bubble { padding:8px 12px; border-radius:18px; background:var(--surface3); word-wrap:break-word; }
.me .msg-bubble { background:var(--accent); color:#fff; }
.msg-sender { font-size:11px; font-weight:bold; color:var(--accent); margin-bottom:2px; }
.msg-time { font-size:9px; color:var(--dim); text-align:right; margin-top:4px; }
.system { text-align:center; font-size:11px; color:var(--dim); margin:8px 0; }
.typing-bar { font-size:11px; color:var(--dim); padding:4px 12px; font-style:italic; min-height:28px; }
.input-area { display:flex; gap:8px; padding:10px; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; }
.msg-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:10px 16px; color:var(--text); font-size:16px; outline:none; }
.send-btn { background:var(--grad); border:none; border-radius:30px; width:44px; height:44px; font-size:18px; cursor:pointer; }

/* Voice panel (modal) */
.voice-modal { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--surface); border-radius:20px; padding:16px; width:280px; z-index:200; border:1px solid var(--accent); box-shadow:0 4px 20px rgba(0,0,0,0.5); display:none; flex-direction:column; gap:12px; }
.voice-modal-header { display:flex; justify-content:space-between; align-items:center; font-weight:bold; }
.voice-participants { max-height:150px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.voice-participant { display:flex; align-items:center; gap:8px; font-size:14px; }
.voice-controls { display:flex; gap:12px; justify-content:center; margin-top:8px; }
.voice-btn { background:var(--surface2); border:none; border-radius:30px; padding:8px 16px; font-size:14px; cursor:pointer; }
.mic-on { background:var(--green); color:#000; }
.mic-off { background:var(--accent2); }
.leave-voice { background:var(--accent2); color:white; }

/* Mobile sidebar */
@media(max-width:700px){
  .sidebar { position:absolute; left:-100%; top:0; bottom:0; z-index:100; transition:left 0.2s; background:var(--surface); }
  .sidebar.open { left:0; }
  .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; display:none; }
  .sidebar-overlay.active { display:block; }
}
</style>
</head>
<body>
<div id="app">
<div id="authScreen">
  <div id="loginWrap" class="auth-wrap">
    <div class="logo-icon">💬</div>
    <div class="logo-title">BurmaldaMess</div>
    <div class="form">
      <input id="lUser" class="inp" placeholder="Никнейм">
      <input id="lPass" class="inp" type="password" placeholder="Пароль">
      <div id="lErr" class="err"></div>
      <button id="lBtn" class="btn">Войти</button>
      <div class="divider">или</div>
      <button id="toReg" class="btn btn-out">Создать аккаунт</button>
    </div>
  </div>
  <div id="regWrap" class="auth-wrap" style="display:none">
    <div class="logo-icon">✨</div>
    <div class="logo-title">Регистрация</div>
    <div class="form">
      <input id="rUser" class="inp" placeholder="Никнейм">
      <input id="rPass" class="inp" type="password" placeholder="Пароль (мин. 8)">
      <div id="rErr" class="err"></div>
      <button id="rBtn" class="btn">Создать</button>
      <div class="divider">или</div>
      <button id="toLgn" class="btn btn-out">Уже есть аккаунт</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:flex-end; padding:6px;"><button id="closeSidebarBtn" class="icon-btn">✕</button></div>
    <div class="sidebar-header">
      <div class="my-profile" id="myProfile"><div id="myAvatar" class="avatar"></div><div><div id="myName"></div><div id="myRole"></div></div><button id="themeBtn" class="icon-btn">🌙</button></div>
      <div class="sidebar-search"><input id="searchInp" placeholder="Поиск"></div>
    </div>
    <div class="chat-list" id="chatList"></div>
    <button class="create-room-btn" id="createRoomBtn">+ Создать комнату</button>
    <div class="sidebar-footer"><button id="logoutBtn" class="icon-btn">🚪</button></div>
  </div>

  <div class="chat-panel">
    <div class="chat-header">
      <button id="menuBtn" class="icon-btn" style="display:none">☰</button>
      <div id="chatAvatar" class="avatar"></div>
      <div><div id="chatRoomName" class="chat-room-name">Общий чат</div><div id="chatStatus" class="chat-status"><span id="onlineText">0 в сети</span></div></div>
      <button id="voiceJoinBtn" class="icon-btn">🎙️</button>
      <button id="deleteRoomBtn" class="icon-btn" style="display:none">🗑️</button>
    </div>
    <div id="msgs"></div>
    <div id="typingBar" class="typing-bar"></div>
    <div class="input-area">
      <button id="emojiBtn" class="icon-btn">😊</button>
      <input id="msgInp" class="msg-input" placeholder="Сообщение" autocomplete="off">
      <button id="sendBtn" class="send-btn">➤</button>
    </div>
  </div>
</div>

<div id="voiceModal" class="voice-modal">
  <div class="voice-modal-header">🎙️ Голосовой чат</div>
  <div id="voiceParticipantsList" class="voice-participants"></div>
  <div class="voice-controls">
    <button id="voiceMicBtn" class="voice-btn mic-off">🔇 Выкл. микрофон</button>
    <button id="voiceLeaveModalBtn" class="voice-btn leave-voice">🚪 Выйти</button>
  </div>
</div>
</div>

<script>
// State
let ws = null, currentUser = null, currentRole = null;
let currentRoom = 'general';
let onlineUsers = [], roomList = [], dmList = [];
let unread = {}, activeSearch = '';
let typingTimer = null;

// Voice
let localStream = null, inVoice = false, micOn = false;
let voicePeers = {}; // user -> RTCPeerConnection

// Call (direct)
let pendingCall = null, callPeer = null, localCallStream = null;

// DOM elements
const msgsDiv = document.getElementById('msgs');
const msgInput = document.getElementById('msgInp');
const sendBtn = document.getElementById('sendBtn');
const voiceModal = document.getElementById('voiceModal');
const voiceParticipantsList = document.getElementById('voiceParticipantsList');
const voiceMicBtn = document.getElementById('voiceMicBtn');
const voiceLeaveModalBtn = document.getElementById('voiceLeaveModalBtn');
const voiceJoinBtn = document.getElementById('voiceJoinBtn');

// Helpers
function avatarColor(name) { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%8; return ['#7c5cfc','#fc5c7d','#00c6ae','#f59e0b','#3b82f6','#ec4899','#10b981','#f97316'][h]; }
function avatarEl(name, cls='') { let d=document.createElement('div'); d.className='avatar '+cls; d.style.background=avatarColor(name); d.textContent=name[0].toUpperCase(); return d; }

// Theme
function setTheme(t) { document.documentElement.setAttribute('data-theme',t); localStorage.setItem('theme',t); document.getElementById('themeBtn').innerText=t==='dark'?'🌙':'☀️'; }
setTheme(localStorage.getItem('theme')||'dark');
document.getElementById('themeBtn').onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

// Auth
document.getElementById('toReg').onclick=()=>{ document.getElementById('loginWrap').style.display='none'; document.getElementById('regWrap').style.display='flex'; };
document.getElementById('toLgn').onclick=()=>{ document.getElementById('regWrap').style.display='none'; document.getElementById('loginWrap').style.display='flex'; };
async function doLogin(){ let u=document.getElementById('lUser').value.trim(), p=document.getElementById('lPass').value; if(!u||!p){ setErr('lErr','Заполните поля'); return; } try{ let r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`}); let d=await r.json(); if(d.ok){ currentUser=d.username; currentRole=d.role; connectWS(); } else setErr('lErr',d.error); } catch{ setErr('lErr','Ошибка соединения'); } }
document.getElementById('lBtn').onclick=doLogin;
document.getElementById('lPass').onkeypress=e=>{ if(e.key==='Enter') doLogin(); };
async function doRegister(){ let u=document.getElementById('rUser').value.trim(), p=document.getElementById('rPass').value; if(!u||!p){ setErr('rErr','Заполните поля'); return; } if(p.length<8){ setErr('rErr','Пароль минимум 8 символов'); return; } try{ let r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`}); let d=await r.json(); if(d.ok){ document.getElementById('rErr').className='ok'; document.getElementById('rErr').innerText='✓ Аккаунт создан'; setTimeout(()=>{ document.getElementById('toLgn').click(); document.getElementById('lUser').value=u; },1000); } else setErr('rErr',d.error); } catch{ setErr('rErr','Ошибка'); } }
document.getElementById('rBtn').onclick=doRegister;
function setErr(id,msg){ let el=document.getElementById(id); el.innerText=msg; el.className='err'; }

// WebSocket
function connectWS(){ let proto=location.protocol==='https:'?'wss://':'ws://'; ws=new WebSocket(`${proto}${location.host}/ws/${encodeURIComponent(currentUser)}`); ws.onopen=()=>{ document.getElementById('authScreen').style.display='none'; document.getElementById('main').style.display='flex'; setupMyProfile(); }; ws.onmessage=e=>handleMsg(JSON.parse(e.data)); ws.onclose=()=>{ alert('Соединение потеряно'); logout(); }; }
function wsSend(obj){ if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

function handleMsg(m){
  if(m.type==='init'){ onlineUsers=m.online_users||[]; roomList=m.rooms||[]; currentRole=m.role; buildSidebar(); updateOnlineStatus(); }
  else if(m.type==='history'){ if(m.data.room_id===currentRoom) renderMsg(m.data,true); }
  else if(m.type==='message'){ if(m.data.room_id===currentRoom){ renderMsg(m.data,false); if(document.hidden) unread[currentRoom]=(unread[currentRoom]||0)+1; } else unread[m.data.room_id]=(unread[m.data.room_id]||0)+1; updateSidebarUnread(); }
  else if(m.type==='system'){ if(!m.room_id || m.room_id===currentRoom) appendSystem(m.text); }
  else if(m.type==='typing'){ if(m.room_id===currentRoom){ let others=(m.users||[]).filter(u=>u!==currentUser); document.getElementById('typingBar').innerHTML=others.length?`✍️ ${others.join(', ')} печатает...`:''; } }
  else if(m.type==='delete'){ if(m.room_id===currentRoom){ let el=document.getElementById('msg-'+m.msg_id); if(el) el.remove(); } }
  else if(m.type==='update_reactions'){ if(m.room_id===currentRoom) updateReactions(m.msg_id,m.reactions); }
  else if(m.type==='online_update'){ onlineUsers=m.online_users||[]; updateOnlineStatus(); buildSidebar(); }
  else if(m.type==='room_joined'){ currentRoom=m.room_id; document.getElementById('chatRoomName').innerText=m.name; msgsDiv.innerHTML=''; updateRoomHeader(); unread[m.room_id]=0; updateSidebarUnread(); }
  else if(m.type==='room_created'){ roomList.push({id:m.room_id,name:m.name}); buildSidebar(); }
  else if(m.type==='room_deleted'){ roomList=roomList.filter(r=>r.id!==m.room_id); if(currentRoom===m.room_id) joinRoom('general'); buildSidebar(); }
  else if(m.type==='voice_update'){ if(m.room_id===currentRoom) updateVoiceUI(m.users); }
  else if(m.type==='kicked'){ alert(m.text); logout(); }
  else if(m.type==='muted'){ alert(m.text); if(inVoice){ micOn=false; updateMicUI(); } }
  // Call signaling
  else if(m.type==='call_offer'){ if(!callPeer) showIncomingCall(m.from,m.offer); else wsSend({type:'call_reject',target:m.from}); }
  else if(m.type==='call_answer'){ if(callPeer && callPeer.signalingState==='have-local-offer') callPeer.setRemoteDescription(new RTCSessionDescription(m.answer)); }
  else if(m.type==='call_ice'){ if(callPeer && m.candidate) callPeer.addIceCandidate(new RTCIceCandidate(m.candidate)); }
  else if(m.type==='call_reject'){ alert(`${m.from} отклонил звонок`); hangUpCall(); }
}

// UI helpers
function setupMyProfile(){ let av=document.getElementById('myAvatar'); av.replaceWith(avatarEl(currentUser)); document.getElementById('myName').innerText=currentUser; document.getElementById('myRole').innerText=currentRole==='owner'?'👑 Владелец':''; }
function buildSidebar(){ /* simplified but functional */ let list=document.getElementById('chatList'); list.innerHTML=''; let roomsSec=document.createElement('div'); roomsSec.innerText='КОМНАТЫ'; roomsSec.className='sidebar-section'; list.appendChild(roomsSec); [...roomList,{id:'general',name:'Общий чат'}].forEach(r=>{ let item=document.createElement('div'); item.className='chat-item'; if(r.id===currentRoom) item.classList.add('active'); let av=document.createElement('div'); av.className='avatar sm'; av.style.background=avatarColor(r.name); av.textContent=r.name[0]; item.appendChild(av); let info=document.createElement('div'); info.className='chat-item-info'; info.innerHTML=`<div class="chat-item-name">${r.name}</div>`; item.appendChild(info); item.onclick=()=>joinRoom(r.id); list.appendChild(item); }); let dmSec=document.createElement('div'); dmSec.innerText='ЛИЧНЫЕ СООБЩЕНИЯ'; dmSec.className='sidebar-section'; list.appendChild(dmSec); onlineUsers.filter(u=>u!==currentUser).forEach(u=>{ let item=document.createElement('div'); item.className='chat-item'; let av=avatarEl(u,'sm'); item.appendChild(av); let info=document.createElement('div'); info.className='chat-item-info'; info.innerHTML=`<div class="chat-item-name">${u}</div>`; item.appendChild(info); item.onclick=()=>joinDM(u); list.appendChild(item); }); }
function updateSidebarUnread(){}
document.getElementById('searchInp').oninput=function(){ activeSearch=this.value; buildSidebar(); };
function joinRoom(id){ if(id===currentRoom) return; wsSend({type:'join_room',room_id:id}); closeSidebar(); leaveVoice(); }
function joinDM(user){ let rid='dm_'+[currentUser,user].sort().join('_'); wsSend({type:'join_room',room_id:rid}); closeSidebar(); leaveVoice(); }
function updateRoomHeader(){ let room=roomList.find(r=>r.id===currentRoom); let name=room?room.name:(currentRoom==='general'?'Общий чат':currentRoom); document.getElementById('chatRoomName').innerText=name; document.getElementById('chatAvatar').style.background=avatarColor(name); document.getElementById('chatAvatar').innerText=name[0]; }
function updateOnlineStatus(){ document.getElementById('onlineText').innerText=`${onlineUsers.length} в сети`; }
function appendSystem(t){ let d=document.createElement('div'); d.className='system'; d.innerText=t; msgsDiv.appendChild(d); msgsDiv.scrollTop=msgsDiv.scrollHeight; }
function renderMsg(data,isHistory){ let isMe=data.sender===currentUser; let wrap=document.createElement('div'); wrap.className=`msg-wrap ${isMe?'me':'them'}`; wrap.id='msg-'+data.id; let bubble=document.createElement('div'); bubble.className='msg-bubble'; if(!isMe){ let s=document.createElement('div'); s.className='msg-sender'; s.innerText=data.sender; bubble.appendChild(s); } let t=document.createElement('span'); t.innerText=data.text; bubble.appendChild(t); wrap.appendChild(bubble); msgsDiv.appendChild(wrap); if(!isHistory) msgsDiv.scrollTop=msgsDiv.scrollHeight; }
function updateReactions(msgId,reactions){}
function sendMessage(){ let text=msgInput.value.trim(); if(text){ wsSend({type:'text',text}); msgInput.value=''; clearTyping(); } }
function startTyping(){ wsSend({type:'typing',typing:true,room_id:currentRoom}); clearTimeout(typingTimer); typingTimer=setTimeout(()=>wsSend({type:'typing',typing:false,room_id:currentRoom}),2000); }
function clearTyping(){ wsSend({type:'typing',typing:false,room_id:currentRoom}); }
msgInput.addEventListener('input',startTyping);
msgInput.addEventListener('keypress',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendMessage(); } });
sendBtn.onclick=sendMessage;

// Voice chat
async function joinVoice(){
  if(inVoice) return;
  if(!navigator.mediaDevices){ alert('Браузер не поддерживает аудио'); return; }
  try{
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    inVoice = true;
    micOn = true;
    wsSend({type:'voice_join'});
    voiceModal.style.display = 'flex';
    updateMicUI();
    // Add local stream to all existing peer connections (if any)
    for(let user in voicePeers){
      localStream.getTracks().forEach(track => voicePeers[user].addTrack(track, localStream));
    }
  } catch(e){ alert('Нет доступа к микрофону'); }
}
function leaveVoice(){
  if(!inVoice) return;
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  for(let pc of Object.values(voicePeers)) pc.close();
  voicePeers = {};
  inVoice = false;
  wsSend({type:'voice_leave'});
  voiceModal.style.display = 'none';
}
function toggleMic(){
  if(!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t=>t.enabled = micOn);
  updateMicUI();
}
function updateMicUI(){
  voiceMicBtn.innerText = micOn ? '🎙️ Вкл. микрофон' : '🔇 Выкл. микрофон';
  voiceMicBtn.className = micOn ? 'voice-btn mic-on' : 'voice-btn mic-off';
}
async function createPeer(target, isInitiator){
  let pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
  voicePeers[target] = pc;
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t, localStream));
  pc.ontrack = e => {
    let audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    audio._pc = pc;
  };
  pc.onicecandidate = e => {
    if(e.candidate) wsSend({type:'call_ice', target:target, candidate:e.candidate});
  };
  if(isInitiator){
    let offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    wsSend({type:'call_offer', target:target, offer});
  }
  return pc;
}
function updateVoiceUI(users){
  voiceParticipantsList.innerHTML = '';
  users.forEach(u => {
    let div = document.createElement('div');
    div.className = 'voice-participant';
    div.appendChild(avatarEl(u,'sm'));
    let span = document.createElement('span');
    span.innerText = u;
    div.appendChild(span);
    voiceParticipantsList.appendChild(div);
    // create peer if not exists and not self
    if(u !== currentUser && !voicePeers[u] && inVoice){
      createPeer(u, true);
    }
  });
  // remove peers for users left
  for(let u in voicePeers){
    if(!users.includes(u)){
      voicePeers[u].close();
      delete voicePeers[u];
    }
  }
}
voiceJoinBtn.onclick = joinVoice;
voiceLeaveModalBtn.onclick = leaveVoice;
voiceMicBtn.onclick = toggleMic;

// Direct call (from profile)
async function startCall(target){
  if(!navigator.mediaDevices) return alert('Не поддерживается');
  try{
    let stream = await navigator.mediaDevices.getUserMedia({audio:true});
    localCallStream = stream;
    let pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    callPeer = pc;
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));
    pc.ontrack = e => { let a=new Audio(); a.srcObject=e.streams[0]; a.autoplay=true; };
    pc.onicecandidate = e => { if(e.candidate) wsSend({type:'call_ice',target:target,candidate:e.candidate}); };
    let offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    wsSend({type:'call_offer',target:target,offer});
    setTimeout(()=>{ if(callPeer && callPeer.signalingState!=='stable'){ alert('Нет ответа'); hangUpCall(); } },30000);
  } catch(e){ alert('Ошибка вызова'); }
}
function showIncomingCall(from,offer){
  if(confirm(`Входящий звонок от ${from}. Принять?`)){
    acceptCall(from,offer);
  } else {
    wsSend({type:'call_reject',target:from});
  }
}
async function acceptCall(from,offer){
  try{
    let stream = await navigator.mediaDevices.getUserMedia({audio:true});
    localCallStream = stream;
    let pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    callPeer = pc;
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));
    pc.ontrack = e => { let a=new Audio(); a.srcObject=e.streams[0]; a.autoplay=true; };
    pc.onicecandidate = e => { if(e.candidate) wsSend({type:'call_ice',target:from,candidate:e.candidate}); };
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    let answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    wsSend({type:'call_answer',target:from,answer});
  } catch(e){ wsSend({type:'call_reject',target:from}); alert('Не удалось ответить'); }
}
function hangUpCall(){
  if(callPeer) callPeer.close();
  if(localCallStream) localCallStream.getTracks().forEach(t=>t.stop());
  callPeer = null; localCallStream = null;
}
function logout(){
  leaveVoice(); hangUpCall();
  if(ws) ws.close();
  localStorage.clear();
  window.location.reload();
}
document.getElementById('logoutBtn').onclick=logout;
