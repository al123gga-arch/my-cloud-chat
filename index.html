<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaldaMessenger</title>
    <style>
        @keyframes grad { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        body { margin: 0; background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Рамка */
        .win { 
            background: #000; display: flex; flex-direction: column; 
            border: 4px solid transparent; 
            border-image: linear-gradient(45deg, #ff0055, #8800ff, #00d2ff) 1;
            animation: grad 5s linear infinite;
        }
        /* Адаптив: на телефоне на весь экран, на ПК по центру */
        @media (max-width: 600px) { .win { width: 100vw; height: 100vh; } }
        @media (min-width: 601px) { .win { width: 400px; height: 600px; border-radius: 20px; } }

        .title { 
            font-size: 24px; font-weight: bold; margin: 20px;
            background: linear-gradient(45deg, #ff0055, #8800ff, #00d2ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px; }
        .in { width: 80%; padding: 12px; border: 1px solid #444; border-radius: 10px; background: #111; color: #fff; outline: none; }
        .btn { padding: 10px 30px; border-radius: 10px; border: none; background: #00d2ff; cursor: pointer; font-weight: bold; }
        
        #chat { display: none; height: 100%; }
        #msgs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .m { padding: 8px; background: #1a1a1a; border-radius: 10px; max-width: 80%; }
        .sys { color: #888; font-size: 0.8em; text-align: center; }
        .foot { padding: 10px; display: flex; gap: 5px; }
    </style>
</head>
<body>
<div class="win" id="login">
    <div class="auth">
        <h3 class="title">BurmaldaMessenger</h3>
        <input id="u" class="in" placeholder="Никнейм">
        <button class="btn" onclick="join()">Войти</button>
    </div>
</div>
<div class="win" id="chat">
    <div id="msgs"></div>
    <div class="foot">
        <input id="m" class="in" style="flex:1" placeholder="Сообщение...">
        <button class="btn" onclick="send()">➤</button>
    </div>
</div>
<script>
    let ws, n;
    function join() {
        n = document.getElementById("u").value;
        if(!n) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${n}`);
        ws.onopen = () => { document.getElementById("login").style.display="none"; document.getElementById("chat").style.display="flex"; };
        ws.onmessage = (e) => {
            const d = document.createElement("div");
            if(e.data.startsWith("SYSTEM:")) { d.className="sys"; d.innerText=e.data.split(":")[1]; }
            else { d.className="m"; d.innerText=e.data; }
            document.getElementById("msgs").appendChild(d);
        };
    }
    function send() { ws.send(document.getElementById("m").value); document.getElementById("m").value=""; }
</script>
</body>
</html>
