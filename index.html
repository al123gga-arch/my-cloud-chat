<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Chat</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; width: 100%; max-width: 400px; height: 70vh; border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* Экран входа */
        #auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; height: 100%; }
        .auth-card { background: #334155; padding: 25px; border-radius: 20px; text-align: center; width: 100%; }
        
        /* Чат */
        #chat-screen { display: none; flex-direction: column; height: 100%; position: relative; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; background: #334155; max-width: 80%; }
        .my { align-self: flex-end; background: #38bdf8; color: #0f172a; }
        
        /* Панель ввода */
        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 10px; align-items: center; border-top: 1px solid #334155; }
        input { flex-grow: 1; padding: 12px; border-radius: 12px; border: none; background: #0f172a; color: white; }
        button { padding: 10px 16px; border-radius: 12px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        /* Смайлики (вкладка) */
        #emoji-popup { display: none; position: absolute; bottom: 70px; right: 10px; background: #334155; padding: 10px; border-radius: 15px; gap: 5px; flex-wrap: wrap; width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px;">Вход</h2>
            <input type="text" id="username" placeholder="Твой ник..." style="width: 100%; margin-bottom: 10px;">
            <button onclick="join()" style="width: 100%;">Войти в чат</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <div id="emoji-popup"></div>
        <div class="input-area">
            <button onclick="toggleEmoji()">😊</button>
            <input type="text" id="msg" placeholder="Сообщение...">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    let ws;
    const emojis = ["😊", "😂", "🔥", "👍", "❤️", "🤔", "🎉", "😎", "🚀", "💀"];
    const popup = document.getElementById("emoji-popup");
    
    emojis.forEach(e => {
        let s = document.createElement("span");
        s.innerText = e; s.style.cursor = "pointer"; s.style.fontSize = "20px";
        s.onclick = () => { document.getElementById("msg").value += e; toggleEmoji(); };
        popup.appendChild(s);
    });

    function toggleEmoji() { popup.style.display = (popup.style.display === 'flex') ? 'none' : 'flex'; }

    function join() {
        const u = document.getElementById("username").value;
        if(!u) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${u}`);
        ws.onopen = () => { document.getElementById("auth-screen").style.display = "none"; document.getElementById("chat-screen").style.display = "flex"; };
        ws.onmessage = (e) => {
            const div = document.createElement("div");
            div.className = "msg";
            div.innerText = e.data;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; }
    }
</script>
</body>
</html>
