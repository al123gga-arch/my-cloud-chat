<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaldaMessenger</title>
    <style>
        :root { --border-gradient: linear-gradient(45deg, #ff0055, #8800ff, #00d2ff); }
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Рамка-переливайка */
        .wrapper { position: relative; width: 400px; height: 600px; background: #111; border-radius: 20px; overflow: hidden; padding: 2px; }
        .wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: var(--border-gradient); animation: rotate 4s linear infinite; }
        .content { position: relative; width: 100%; height: 100%; background: #111; border-radius: 18px; display: flex; flex-direction: column; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; background: #222; border-radius: 12px; max-width: 80%; }
        .my { align-self: flex-end; background: #444; }
        
        .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; }
        button { padding: 10px; border-radius: 10px; border: none; background: #444; color: white; cursor: pointer; }
        
        /* Смайлики */
        #emoji-menu { display: none; padding: 10px; background: #111; grid-template-columns: repeat(6, 1fr); gap: 5px; }
    </style>
</head>
<body>

<div class="wrapper" id="auth">
    <div class="content" style="justify-content:center; align-items:center; gap:20px;">
        <h1>BurmaldaMessenger</h1>
        <input type="text" id="user" placeholder="Твой ник..." style="width:70%;">
        <button onclick="join()">Войти</button>
    </div>
</div>

<div class="wrapper" id="chat" style="display:none;">
    <div class="content">
        <div id="messages"></div>
        <div id="emoji-menu"></div>
        <div class="input-area">
            <button onclick="toggleEmoji()">😊</button>
            <input type="text" id="msg" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    let ws, myName;
    const emojis = ["😀", "😂", "🥰", "😎", "🤔", "🔥", "👍", "❤️", "💀", "🚀", "🎉", "😱"];
    const emDiv = document.getElementById("emoji-menu");
    
    emojis.forEach(e => {
        let s = document.createElement("span"); s.innerText = e; s.style.cursor="pointer";
        s.onclick = () => document.getElementById("msg").value += e;
        emDiv.appendChild(s);
    });

    function toggleEmoji() { emDiv.style.display = emDiv.style.display === 'grid' ? 'none' : 'grid'; }

    function join() {
        myName = document.getElementById("user").value;
        if(!myName) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${myName}`);
        ws.onopen = () => { document.getElementById("auth").style.display="none"; document.getElementById("chat").style.display="block"; };
        ws.onmessage = (e) => {
            const p = e.data.split(':');
            const d = document.createElement("div");
            d.className = "msg " + (p[0] === myName ? "my" : "");
            d.innerText = p[0] + ": " + p.slice(1).join(':');
            document.getElementById("messages").appendChild(d);
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; }
    }
</script>
</body>
</html>
