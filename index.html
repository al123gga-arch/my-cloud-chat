<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseChat</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; height: 100%; background: #1e293b; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; background: #334155; }
        .my { align-self: flex-end; background: #38bdf8; color: #0f172a; }
        .sender { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
        .sys { align-self: center; font-size: 11px; color: #64748b; padding: 5px; }

        .controls { padding: 10px; background: #0f172a; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #1e293b; color: white; }
        button { padding: 8px 16px; border-radius: 8px; border: none; background: #38bdf8; cursor: pointer; }
    </style>
</head>
<body>
<div class="app" id="login">
    <div style="margin: auto; text-align: center;">
        <h1>PulseChat</h1>
        <input type="text" id="user" placeholder="Твой никнейм"><br><br>
        <button onclick="join()">Войти в чат</button>
    </div>
</div>
<div class="app" id="chat" style="display:none;">
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="msg" placeholder="Сообщение...">
        <button onclick="send()">➤</button>
    </div>
</div>
<script>
    let ws, name;
    function join() {
        name = document.getElementById("user").value;
        if(!name) return;
        ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/ws/${name}`);
        ws.onopen = () => { document.getElementById("login").style.display="none"; document.getElementById("chat").style.display="flex"; };
        ws.onmessage = (e) => {
            const p = e.data.split(':');
            const div = document.createElement("div");
            if(p[0] === "СИСТЕМА") { div.className = "sys"; div.innerText = p[1]; }
            else { 
                div.className = "msg " + (p[0] === name ? "my" : "");
                div.innerHTML = `<div class="sender">${p[0]}</div><div>${p.slice(1).join(':')}</div>`;
            }
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = 9999;
        };
    }
    function send() {
        const m = document.getElementById("msg");
        if(m.value) { ws.send(m.value); m.value = ""; }
    }
</script>
</body>
</html>
